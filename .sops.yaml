# https://github.com/Mic92/sops-nix
#
# keys:
#   - &light age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#   - &tiny    age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#
# creation_rules:
#   - path_regex: secrets/.*
#     key_groups:
#       - age:
#           - *light
#           - *tiny
